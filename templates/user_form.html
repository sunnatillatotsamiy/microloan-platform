{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="page-header">
            <h2>{{ action }} User</h2>
        </div>
        <div class="card">
            <div class="card-body p-4">
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control"
                            value="{{ target_user.username }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control"
                            value="{{ target_user.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Password {% if action == 'Edit' %}<span class="text-muted">(leave blank to keep current)</span>{% endif %}
                        </label>
                        <input type="password" name="password" class="form-control"
                            {% if action == 'Create' %}required{% endif %}>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="phone_number" class="form-control"
                            value="{{ target_user.phone_number }}">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select">
                            <option value="customer" {% if target_user.role == 'customer' %}selected{% endif %}>Customer</option>
                            <option value="manager" {% if target_user.role == 'manager' %}selected{% endif %}>Manager</option>
                            <option value="admin" {% if target_user.role == 'admin' %}selected{% endif %}>Admin</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="bi bi-check-lg me-1"></i> Save User
                        </button>
                        <a href="/users/" class="btn btn-secondary flex-fill">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
