version: "3.9"

services:
  db:
    image: postgres:15
    container_name: microloan_db
    restart: always
    environment:
      POSTGRES_DB: microloan_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microloan_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: freddiestephenson/microloan-platform:latest
    container_name: microloan_web
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env

  nginx:
    image: freddiestephenson/microloan-platform-nginx:latest
    container_name: microloan_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: