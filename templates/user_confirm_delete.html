{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4 text-center">
                <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
                <h3>Delete User</h3>
                <p class="text-muted">Are you sure you want to delete <strong>{{ target_user.username }}</strong>? This will also delete all their loan applications and cannot be undone.</p>
                <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="/users/" class="btn btn-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
